<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITANIUM WHITE | K.S. SYSTEM</title>
    <style>
        :root {
            --system-font: 'Helvetica', Arial, sans-serif;
            --bg-color: #ffffff;
            --text-main: #000000;
            --text-soft: #444444; 
            --text-cite: #cccccc; 
            --border-line: #eeeeee;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--system-font);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-weight: normal; 
        }

        header {
            width: 100%;
            max-width: 1100px;
            border-bottom: 2px solid #000;
            margin-bottom: 40px;
            padding-bottom: 10px;
        }

        .log-status { font-size: 10px; color: #666; margin-top: 5px; text-transform: lowercase; }

        table { width: 100%; max-width: 1100px; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 10px; border-bottom: 1px solid #000; text-transform: uppercase; font-size: 11px; font-weight: normal; }
        td { padding: 15px 10px; border-bottom: 1px solid var(--border-line); }

        /* COLUMN SPACING */
        .col-museum { width: 30%; }
        .col-location { width: 25%; padding-right: 40px; }
        .col-date { width: 20%; padding-right: 40px; }
        .col-time { width: 25%; }

        .museum-link { color: #000; text-decoration: underline; font-weight: normal; }

        /* ACTIVE TIME TRIGGER */
        .timestamp {
            background: transparent;
            color: var(--text-cite);
            border: 1px solid var(--text-cite); 
            padding: 4px 10px;
            cursor: pointer;
            font-size: 11px;
            display: inline-block;
            pointer-events: auto; /* Ensures clickability */
        }
        .timestamp:hover { border-color: var(--text-soft); color: var(--text-soft); }

        #repository {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #fff;
            z-index: 1000;
            overflow-y: auto;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .extraction-view { max-width: 800px; margin: 40px auto; text-align: center; }
        .provenance-ledger { font-size: 12px; text-align: left; max-width: 500px; margin: 0 auto; line-height: 1.6; }
        .cite { color: var(--text-cite); font-size: 10px; vertical-align: super; font-weight: normal; }

        .close-protocol { 
            display: block; 
            margin: 40px auto; 
            background: var(--text-cite); 
            color: var(--text-soft); 
            border: none; 
            padding: 15px 30px; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-size: 11px;
        }
    </style>
</head>
<body>

 <header style="display: flex; justify-content: space-between; align-items: baseline; width: 100%; max-width: 1100px; border-bottom: 2px solid #000; margin-bottom: 40px; padding-bottom: 10px;">
        <div class="log-status" style="font-size: 10px; color: #666; text-transform: lowercase;">#system_trace: ongoing</div>
        <a href="index.html" style="text-decoration: none; color: #000; font-size: 11px; text-transform: uppercase; letter-spacing: 1px;">chromastack.com</a>
    </header>

    <table>
        <thead>
            <tr>
                <th class="col-museum">Museum</th>
                <th class="col-location">Location</th>
                <th class="col-date">Date</th>
                <th class="col-time">Time</th>
            </tr>
        </thead>
        <tbody>
         
        </tbody>
    </table>

    <div id="repository">
        <div class="extraction-view">
            <div style="font-size: 11px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px;">SHADOW PROVENANCE</div>
            <div id="extraction-provenance" class="provenance-ledger"></div>
            <button class="close-protocol" onclick="closeNode()">CLOSE_PROTOCOL</button>
        </div>
    </div>

 <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTW-GwSF7XtNJpj4sGdbufA5OhAwb5j6q97J2ZoIq-OSyrNWoPKvdvyg6fcYKp54Z4UxY0B3bhA0IHw/pub?output=csv';

        async function loadChromaData() {
            try {
                const response = await fetch(sheetUrl);
                const data = await response.text();
                const rows = data.split('\n').map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
                const tableBody = document.querySelector('tbody');
                
                // This version APPENDS data instead of erasing, so your manual rows stay
                for (let i = 1; i < rows.length; i++) {
                    const cols = rows[i];
                    if (cols.length < 5) continue; 

                    const [museum, url, location, date, time, artist, work, material, provenance, citeId] = cols.map(c => c.replace(/"/g, '').trim());

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><a href="${url}" class="museum-link" target="_blank" rel="noopener noreferrer">${museum}</a> <span class="cite">[${citeId}]</span></td>
                        <td class="col-location">${location} <span class="cite">[${citeId}]</span></td>
                        <td class="col-date">${date} <span class="cite">[${citeId}]</span></td>
                        <td class="col-time">
                            <span class="timestamp" 
                                  onpointerup="openNode('${artist}', '${work}', '${material}', '${provenance}')" 
                                  style="border:none; background:none; cursor:pointer; -webkit-tap-highlight-color:transparent; display:inline-block; padding:10px 0;">
                                  [ ${time} ]
                            </span>
                            <span class="cite">[${citeId}]</span>
                        </td>
                    `;
                    tableBody.prepend(tr);
                }
            } catch (error) {
                console.error("Connection failed.", error);
            }
        }

        function openNode(artist, work, material, provenance) {
            const ledger = `
                ARTIST: ${artist}<br>
                WORK: ${work}<br>
                MATERIAL: ${material}<br>
                PROVENANCE: ${provenance}
            `;
            document.getElementById('extraction-provenance').innerHTML = ledger;
            document.getElementById('repository').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeNode() {
            document.getElementById('repository').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        loadChromaData();
    </script>

<footer style="text-align: center; padding: 80px 20px 60px; font-size: 11px; letter-spacing: 2px; color: var(--text-cite); text-transform: uppercase; border-top: 1px solid #1a1a1a; margin-top: 80px; font-family: monospace; line-height: 2;">
    #K.ari.n Schneider 2026 &copy; 
    <br>
    <a href="https://karinschneider.com" style="color: inherit; text-decoration: none; border-bottom: 1px dotted #444;">karinschneider.com</a>
</footer>

</body>
</html>
