<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grey Stack | Karin Schneider</title>
    <style>
        body {
            margin: 0;
            background-color: #a0a0a0; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Helvetica', Arial, sans-serif;
        }

        /* Just the word "back", no arrow */
        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: #444; 
            text-transform: uppercase;
            font-weight: bold;
            font-size: 11px;
            letter-spacing: 1.5px;
            z-index: 20;
        }

        .aperture {
            width: 58vw; 
            height: 58vw;
            max-width: 580px;
            max-height: 580px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: inset 0 4px 20px rgba(0,0,0,0.5);
            background-color: #a0a0a0; /* Match background color */
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent; /* Fixes the iOS tap square */
        }

        #camera-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block; /* This is crucial for hiding the placeholder */
            /* Filter removed for sharp focus */
        }

        footer { 
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            font-size: 10px; 
            color: #444; 
            text-transform: lowercase; 
            text-align: right;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">Back</a>

    <div class="aperture" id="portal-trigger">
        <video id="camera-feed" autoplay playsinline></video>
    </div>

    <footer>
        #K.ari.n Schneider 2026 &copy; karinschneider.com
    </footer>

    <script>
        const video = document.getElementById('camera-feed');
        const trigger = document.getElementById('portal-trigger');

        trigger.addEventListener('click', () => {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then(stream => {
                    video.srcObject = stream;
                })
                .catch(err => {
                    console.error("Camera access denied: ", err);
                });
        });
    </script>
</body>
</html>
