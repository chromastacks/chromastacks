<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; background: #000; height: 100vh; overflow: hidden; }
        #x-ray-plate { 
            width: 100vw; height: 100vh; object-fit: cover;
            filter: grayscale(1) invert(1) contrast(8) brightness(1.1);
        }
    </style>
</head>
<body>
    <canvas id="x-ray-plate"></canvas>
    <script>
        const canvas = document.getElementById('x-ray-plate');
        const ctx = canvas.getContext('2d');

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();
                
                video.onloadedmetadata = () => {
                    canvas.style.display = 'block';
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    
                    function render() {
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        requestAnimationFrame(render);
                    }
                    render();
                };
            } catch (err) {
                console.error("Camera access error:", err);
                alert("Camera access required: " + err.message);
            }
        }
        
        // Trigger on click to bypass browser autoplay blocks
        window.addEventListener('click', init, { once: true });
    </script>
</body>
</html>
