<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karin Schneider</title>
    <style>
        :root {
            --bg-color: #f0f0f0;
            --glass-bg: rgba(255, 255, 255, 0.2);
            --border-light: rgba(255, 255, 255, 0.4);
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Helvetica', Arial, sans-serif;
        }

        /* The Stack Container */
        .stack {
            display: flex;
            flex-direction: column;
            gap: 4px; /* Slight gap between "hard drives" */
            width: 90%;
            max-width: 500px;
            padding: 20px;
        }

        /* Each Hard Drive (Link) */
        .drive {
            display: block;
            text-decoration: none;
            color: #333;
            padding: 20px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            font-size: 14px;
            
            /* Glassmorphism Effect */
            background: var(--glass-bg);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
            animation: pulse-line 4s infinite ease-in-out;
        }

        @keyframes pulse-line {
            0% { border-color: rgba(255, 255, 255, 0.4); }
            50% { border-color: rgba(255, 255, 255, 0.8); }
            100% { border-color: rgba(255, 255, 255, 0.4); }
        }

        /* Hover States for Colors */
        .drive:hover {
            transform: translateY(-5px) scale(1.02);
            color: #fff;
        }

        /* Specific Chroma Colors on Hover */
        .t-white:hover { background-color: rgba(255, 255, 255, 0.9); color: #000; box-shadow: 0 0 25px #fff; }
        .p-green:hover { background-color: rgba(152, 251, 152, 0.7); box-shadow: 0 0 25px #98fb98; }
        .blue:hover    { background-color: rgba(0, 102, 204, 0.7); box-shadow: 0 0 25px #0066cc; }
        .achroma:hover { background-color: rgba(100, 100, 100, 0.5); border: 1px solid #fff; }
        .black:hover   { background-color: rgba(0, 0, 0, 0.85); box-shadow: 0 0 25px #000; }
        .red:hover     { background-color: rgba(204, 0, 0, 0.7); box-shadow: 0 0 25px #cc0000; }
        .grey:hover    { background-color: rgba(128, 128, 128, 0.7); }
        .white:hover   { background-color: rgba(255, 255, 255, 0.5); color: #000; }

        /* Footnote Styling */
        footer {
            margin-top: 80px;
            padding: 60px 20px;
            font-size: 11px;
            letter-spacing: 2px;
            color: #999;
            text-transform: uppercase;
            font-family: monospace;
            border-top: 1px solid rgba(0,0,0,0.05);
            text-align: center;
        }

    </style>
</head>
<body>

    <a href="#pale-green" class="drive p-green">Pale Green (2023–Ongoing)</a>

</div>
